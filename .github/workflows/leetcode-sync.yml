name: LeetCode Smart Sync

on:
  workflow_dispatch:
    inputs:
      sync_mode:
        description: 'Select Sync Mode'
        required: true
        type: choice
        options:
          - 'Selective (Single Problem)'
          - 'Timeline (All since specific date)'
      problem_slug:
        description: 'Problem Slug (e.g., two-sum) - Only for Selective Mode'
        required: false
        type: string
      start_date:
        description: 'Start Date (YYYY-MM-DD) - Only for Timeline Mode'
        required: false
        default: '2026-04-01'

jobs:
  build_and_sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install requests

      - name: Execute Fetch Script
        env:
          LEETCODE_SESSION: ${{ secrets.LEETCODE_SESSION }}
          LEETCODE_CSRF_TOKEN: ${{ secrets.LEETCODE_CSRF_TOKEN }}
          SYNC_MODE: ${{ github.event.inputs.sync_mode }}
          PROBLEM_SLUG: ${{ github.event.inputs.problem_slug }}
          START_DATE: ${{ github.event.inputs.start_date }}
        run: python scripts/fetch_solution.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "action@github.com"
          git add .
          # We use "|| exit 0" so the workflow doesn't fail if there's nothing new to commit
          git commit -m "Automated Sync: ${{ github.event.inputs.problem_slug }}${{ github.event.inputs.sync_mode }}" || exit 0
          git push
